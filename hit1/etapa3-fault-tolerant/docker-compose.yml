services:
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  worker:
    restart: on-failure
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      FAIL_PROBABILITY: "0.3"
    volumes:
      - ./logs:/app/logs
    deploy:
      replicas: 4

  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      NUM_CHUNKS: "4"
      INPUT_IMAGE: /app/images/input.jpg
      OUTPUT_IMAGE: /app/images/output.jpg
      TASK_TIMEOUT_SECONDS: "30"
    volumes:
      - ./images:/app/images
      - ./logs:/app/logs
    profiles: ["master"]

volumes:
  rabbitmq_data:
