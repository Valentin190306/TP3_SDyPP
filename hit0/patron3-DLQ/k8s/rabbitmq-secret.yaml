---
# Secret con credenciales de RabbitMQ
# Para crear este Secret manualmente:
#   kubectl create secret generic rabbitmq-secret \
#     --from-literal=RABBITMQ_USER=guest \
#     --from-literal=RABBITMQ_PASS=guest
#
# O aplicar este manifiesto (los valores están en base64):
#   echo -n 'guest' | base64  →  Z3Vlc3Q=
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: default
type: Opaque
data:
  RABBITMQ_USER: Z3Vlc3Q=   # guest
  RABBITMQ_PASS: Z3Vlc3Q=   # guest
